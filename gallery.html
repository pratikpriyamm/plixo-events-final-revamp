<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | PlixoEvents</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #FAF9F6;
  margin: 0;
  padding: 40px 20px;
}

.gallery-header {
  text-align: center;
  margin-bottom: 50px;
}

.gallery-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 3rem;
  color: #333;
}

.back-btn {
  text-decoration: none;
  color: #0E5A5A;
  border: 1px solid #0E5A5A;
  padding: 8px 18px;
  border-radius: 30px;
  display: inline-block;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.back-btn:hover {
  background-color: #0E5A5A;
  color: #fff;
}

.gallery-grid {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.gallery-grid img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
  background-color: #e0e0e0; /* Loading placeholder color */
}

.gallery-grid img:hover {
  transform: translateY(-5px);
}

/* Error Message Styling */
.error-msg {
  text-align: center;
  font-size: 1.2rem;
  color: #666;
  grid-column: 1 / -1;
}
</style>
</head>

<body>

<div class="gallery-header">
  <a href="index.html" class="back-btn">← Back</a>
  <h1 id="galleryTitle">Loading...</h1>
</div>

<div class="gallery-grid" id="galleryGrid"></div>

<script src="gallery.js"></script> 

</body>
</html>
